<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NONLINEAR — April 11 — CDMX</title>
  <meta name="description" content="Emilio, Maikol, Maddix, Just Ask. Immersive Light Experience. Funktion-One Sound. Studio Olbrera — Álvarez de Icaza 13, CDMX. April 11, 10PM–Late." />
  <meta property="og:title" content="NONLINEAR — April 11" />
  <meta property="og:description" content="Immersive Light Experience. Funktion-One Sound. Studio Olbrera — Álvarez de Icaza 13, CDMX" />
  <meta property="og:image" content="/flyer.jpg" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #c0392b;
      --red-dim: #7a1f18;
      --bg: #080808;
      --fg: #f0ece4;
      --muted: #666;
      --border: #1a1a1a;
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    /* ── PAGE LAYOUT ── */
    .page {
      max-width: 400px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    /* ── FLYER ── */
    .flyer-wrap {
      margin-bottom: 2rem;
    }

    .flyer-wrap img {
      width: 100%;
      display: block;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    /* ── BODY ── */
    .body {
      min-width: 0;
    }

    /* ── TITLE BLOCK ── */
    .title-block {
      padding-top: 0;
      border-top: none;
    }

    .event-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 22vw, 5.5rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--fg);
      text-transform: uppercase;
    }

    .tagline {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      margin-top: 0.9rem;
      font-weight: 500;
    }

    /* ── DIVIDER ── */
    .rule {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* ── META ── */
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem 1rem;
      margin-bottom: 2rem;
    }

    .meta-item label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .meta-item span {
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--fg);
      line-height: 1.35;
    }

    /* ── LINEUP ── */
    .lineup {
      margin-bottom: 2rem;
    }

    .lineup label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .lineup-names {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 12vw, 3.2rem);
      line-height: 1;
      letter-spacing: 0.03em;
      color: var(--fg);
    }

    .lineup-names span {
      display: block;
    }

    /* ── SPECS ── */
    .specs {
      margin-bottom: 2.5rem;
    }

    .specs label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .spec-line {
      font-size: 0.8rem;
      color: #aaa;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 2;
      font-weight: 300;
    }

    /* ── CTA ── */
    .cta-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .btn-tickets {
      display: block;
      width: 100%;
      padding: 1.1rem 1rem;
      background: var(--red);
      color: #fff;
      text-decoration: none;
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 4px;
      transition: background 0.15s ease;
    }

    .btn-tickets:hover,
    .btn-tickets:active {
      background: #a93226;
    }

    .location-note {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="flyer-wrap">
      <img src="/flyer.jpg" alt="Nonlinear — April 11 — CDMX" />
    </div>

    <div class="body">

    <div class="title-block">
      <div class="event-name">Nonlinear</div>
      <div class="tagline">An evening of sound &amp; light</div>
    </div>

    <div class="rule"></div>

    <div class="meta">
      <div class="meta-item">
        <label>Date</label>
        <span>April 11, 2026</span>
      </div>
      <div class="meta-item">
        <label>Doors</label>
        <span>10PM – Late</span>
      </div>
      <div class="meta-item">
        <label>Location</label>
        <span>Studio Olbrera<br/>Álvarez de Icaza 13</span>
      </div>
      <div class="meta-item">
        <label>Sound</label>
        <span>Funktion-One</span>
      </div>
    </div>

    <div class="rule"></div>

    <div class="lineup">
      <label>Lineup</label>
      <div class="lineup-names">
        <span>Emilio</span>
        <span>Maikol</span>
        <span>Maddix</span>
        <span>Just Ask</span>
      </div>
    </div>

    <div class="specs">
      <label>Experience</label>
      <div class="spec-line">
        Immersive Light Experience<br/>
        Funktion-One Sound System<br/>
        Studio Olbrera · Álvarez de Icaza 13
      </div>
    </div>

    <div class="cta-block">
      <a href="https://grail.mx" class="btn-tickets" target="_blank" rel="noopener">Buy Tickets</a>
      <div class="location-note">Studio Olbrera · Álvarez de Icaza 13</div>
    </div>

    <div class="footer">grail.mx</div>

    </div>
  </div>

</body>
</html>
